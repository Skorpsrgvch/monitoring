global:
  smtp_smarthost: smtp.yandex.ru:587
  smtp_from: dimaizotov67@yandex.ru
  smtp_auth_username: dimaizotov67@yandex.ru
  smtp_auth_password: cllxyjkfgjbyqvcc
  resolve_timeout: 5m

route:
  group_by: ['alertname', 'severity']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: 'default-receiver'
  routes:
    - match:
        severity: critical
      receiver: 'critical-alerts'
      group_wait: 10s
      repeat_interval: 1h
    - match:
        severity: warning
      receiver: 'warning-alerts'
      group_wait: 1m
      repeat_interval: 6h

receivers:
  - name: 'default-receiver'
    email_configs:
      - to: 'admin@yourdomain.com'
        send_resolved: true
        headers:
          Subject: '[{{ .Status | toUpper }}] Alert: {{ .GroupLabels.alertname }}'

  - name: 'critical-alerts'
    email_configs:
      - to: 'admin@yourdomain.com'
        send_resolved: true
        headers:
          Subject: '[🔴 CRITICAL] {{ .GroupLabels.alertname }}'

  - name: 'warning-alerts'
    email_configs:
      - to: 'admin@yourdomain.com'
        send_resolved: true
        headers:
          Subject: '[⚠️ WARNING] {{ .GroupLabels.alertname }}'

inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'instance']