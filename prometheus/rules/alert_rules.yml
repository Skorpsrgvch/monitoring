groups:
  - name: system_alerts
    interval: 30s
    rules:
      - alert: HighCPUUsage
        expr: 100 - (avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High CPU usage detected"
          description: "CPU usage is above 80% (current value: {{ $value }}%) on instance {{ $labels.instance }}"

      - alert: HighMemoryUsage
        expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High memory usage detected"
          description: "Memory usage is above 85% (current value: {{ $value }}%) on instance {{ $labels.instance }}"

      - alert: DiskSpaceLow
        expr: (node_filesystem_avail_bytes{fstype!~"tmpfs|overlay"} / node_filesystem_size_bytes{fstype!~"tmpfs|overlay"}) * 100 < 15
        for: 10m
        labels:
          severity: critical
        annotations:
          summary: "Low disk space"
          description: "Disk space is below 15% (current value: {{ $value }}%) on instance {{ $labels.instance }}"

  - name: container_alerts
    rules:
      - alert: ContainerHighMemory
        expr: (container_memory_usage_bytes{container_label_com_docker_compose_service!=""} / container_spec_memory_limit_bytes) * 100 > 90 and container_spec_memory_limit_bytes > 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Container memory usage high"
          description: "Container {{ $labels.container_label_com_docker_compose_service }} memory usage is above 90%"

      - alert: ContainerDown
        expr: up{job=~"prometheus|grafana|node-exporter|cadvisor|alertmanager|blackbox-exporter"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Container {{ $labels.job }} is down"
          description: "{{ $labels.job }} has been down for more than 1 minute"

  - name: service_availability
    rules:
      - alert: PrometheusDown
        expr: absent(up{job="prometheus"} == 1)
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Prometheus is down"
          description: "Prometheus server is not responding"

      - alert: GrafanaDown
        expr: absent(up{job="grafana"} == 1)
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Grafana is down"
          description: "Grafana server is not responding"

      - alert: NodeExporterDown
        expr: absent(up{job="node-exporter"} == 1)
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Node Exporter is down"
          description: "Node Exporter on {{ $labels.instance }} is not responding"

      - alert: BlackboxProbeFailed
        expr: probe_success == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Blackbox probe failed"
          description: "Probe {{ $labels.instance }} failed"

      - alert: SiteDown
        expr: probe_success{instance="https://olga-pimchenko.ru"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Сайт недоступен"
          description: "Сайт не отвечает на HTTPS-запросы"

  - name: recording_rules
    interval: 30s
    rules:
      - record: instance:node_cpu_usage:rate5m
        expr: 100 - (avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100)